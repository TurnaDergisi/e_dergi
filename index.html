<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Turna Dergisi - E-Dergi</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- jQuery UI (Turn.js için gerekli) -->
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>

  <!-- Turn.js -->
  <script src="https://raw.githack.com/blasten/turn.js/master/turn.min.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Panzoom for smooth zooming -->
  <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>

  <!-- Stil dosyası -->
  <link rel="stylesheet" href="stil.css">
</head>
<body>
  <!-- Yükleme göstergesi -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Dergi Yükleniyor...</div>
    <div id="loading-progress"></div>
  </div>

  <!-- Flipbook konteyneri -->
  <div id="flipbook-container" style="display: none;">
    <div id="flipbook-wrapper">
      <div id="flipbook"></div>
    </div>
  </div>

  <!-- Glassmorphic Controls Dock -->
  <div id="controls-dock" style="display: none;">
    <div class="dock-controls">
      <!-- Müzik Kontrolleri -->
      <div id="music-controls">
        <button id="play-music-btn" class="btn-glass" title="Müziği Çal">
          <span class="btn-icon">🎵</span> <span class="btn-text">Çal</span>
        </button>
        <button id="pause-music-btn" class="btn-glass" style="display: none;" title="Müziği Duraklat">
          <span class="btn-icon">⏸️</span> <span class="btn-text">Duraklat</span>
        </button>

        <div class="volume-wrapper">
          <span>🔊</span>
          <input type="range" id="volume-slider" min="0" max="100" value="50">
        </div>
      </div>

      <!-- Zoom Kontrolleri -->
      <div id="zoom-controls">
        <button id="zoom-out-btn" class="btn-glass" title="Uzaklaştır">
           <span class="btn-icon">➖</span>
        </button>
        <button id="zoom-reset-btn" class="btn-glass" title="Orijinal Boyut">
           <span class="btn-icon">🏠</span>
        </button>
        <button id="zoom-in-btn" class="btn-glass" title="Yakınlaştır">
           <span class="btn-icon">➕</span>
        </button>
      </div>

      <!-- Sayfa Kontrolleri -->
      <div class="page-controls">
        <button id="prev-btn" class="btn-glass" title="Önceki Sayfa">
          <span class="btn-icon">◀</span>
        </button>
        <span id="page-info"></span>
        <button id="next-btn" class="btn-glass" title="Sonraki Sayfa">
          <span class="btn-icon">▶</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Müzik elementi (gizli) -->
  <audio id="background-music" loop>
    <source src="https://drive.google.com/uc?export=download&id=12FeOxyc6Q_yg1vm-Mt7k18Uz3IBe5xDd" type="audio/mpeg">
  </audio>

  <script>
    // ============================================
    //  YAPILANDIRMA - PDF ve Müzik Dosya ID'leri
    // ============================================
    var PDF_DOSYA_ID = '1KSsIMeXKKH4zMuwFDthvdtC9ia0AgIWg';
    var MUSIC_FILE_ID = '12FeOxyc6Q_yg1vm-Mt7k18Uz3IBe5xDd';

    // Yerel (GitHub repodaki) PDF dosyası
    var PDF_URL = 'dergi.pdf';

    // ============================================
    //  SAYFA YÜKLEME
    // ============================================
    $(document).ready(function() {
      console.log('Sayfa yüklendi, PDF yükleniyor...');

      // PDF.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      // PDF'i doğrudan URL'den yükle
      var loadingTask = pdfjsLib.getDocument(PDF_URL);

      loadingTask.promise.then(function(pdf) {
        console.log('PDF yüklendi, toplam sayfa:', pdf.numPages);
        var totalPages = pdf.numPages;
        var renderedPages = [];

        // Tüm sayfaları sırayla render et
        var renderPromise = Promise.resolve();

        for (var pageNum = 1; pageNum <= totalPages; pageNum++) {
          (function(num) {
            renderPromise = renderPromise.then(function() {
              return renderPage(pdf, num).then(function(pageData) {
                renderedPages.push(pageData);
                // İlerleme göster
                var pct = Math.round((num / totalPages) * 100);
                $('#loading-progress').text(num + ' / ' + totalPages + ' sayfa (' + pct + '%)');
                console.log('Sayfa render edildi:', num, '/', totalPages);
              });
            });
          })(pageNum);
        }

        renderPromise.then(function() {
          console.log('Tüm sayfalar render edildi:', renderedPages.length);

          // Sayfa numarasına göre sırala
          renderedPages.sort(function(a, b) {
            return a.pageNum - b.pageNum;
          });

          // Sayfaları sırayla flipbook'a ekle
          renderedPages.forEach(function(pageData, index) {
            var pageDiv = $('<div></div>').addClass('page');

            pageDiv.css({
              'width': pageData.pageWidth + 'px',
              'height': pageData.pageHeight + 'px',
              'display': 'flex',
              'justify-content': 'center',
              'align-items': 'center',
              'overflow': 'hidden'
            });

            $(pageData.canvas).css({
              'width': '100%',
              'height': '100%',
              'object-fit': 'fill', // Orijinal oran bozulmadan tam oturt (Aspect ratio zaten JS'de hesaplandı)
              'display': 'block'
            });

            pageDiv.append(pageData.canvas);
            $('#flipbook').append(pageDiv);
          });

          // Yükleme göstergesini gizle, flipbook'u göster
          $('#loading').fadeOut(300, function() {
            $('#flipbook-container').fadeIn(300);
            $('#controls-dock').css('display', 'flex').hide().fadeIn(300);
          });

          // Turn.js'nin yüklenip yüklenmediğini kontrol et
          if (typeof $.fn.turn !== 'function') {
            console.error('Turn.js yüklenemedi!');
            $('#loading').html('<p style="color: #f87171;">Turn.js yüklenemedi. Lütfen sayfayı yenileyin.</p>').show();
            return;
          }

          // Turn.js'yi başlat
          try {
            var dims = calculateFlipbookDimensions();
            var flipbookWidth = dims.width;
            var flipbookHeight = dims.height;
            var displayMode = dims.display;

            $('#flipbook').turn({
              width: flipbookWidth,
              height: flipbookHeight,
              autoCenter: true,
              elevation: 50,
              gradients: true,
              acceleration: true,
              display: displayMode,
              duration: 1000,
              when: {
                turned: function(event, page, view) {
                  $('#page-info').text(page + ' / ' + totalPages);
                }
              }
            });

            // Sayfa bilgisi
            $('#page-info').text('1 / ' + totalPages);

            // Kontrol butonları
            $('#prev-btn').click(function() {
              $('#flipbook').turn('previous');
            });

            $('#next-btn').click(function() {
              $('#flipbook').turn('next');
            });

            // Klavye kontrolü
            $(document).keydown(function(e) {
              if (e.keyCode == 37) {
                $('#flipbook').turn('previous');
              } else if (e.keyCode == 39) {
                $('#flipbook').turn('next');
              }
            });

            // Tıklama ile sayfa çevirme (masaüstü)
            var isDragging = false;
            $('#flipbook').on('mousedown', function() { isDragging = false; });
            $('#flipbook').on('mousemove', function() { isDragging = true; });
            $('#flipbook').on('mouseup', function(e) {
              if (isDragging) return;
              var w = $(this).width();
              var x = e.pageX - $(this).offset().left;
              if (x < w / 2) {
                $(this).turn('previous');
              } else {
                $(this).turn('next');
              }
            });
            $('#flipbook').css('cursor', 'pointer');

            // Mobile touch: Turn.js native swipe'a izin veriyoruz
            
            // Müzik kontrollerini başlat
            initMusicControls();

            // Panzoom (Yakınlaştırma / Kaydırma) Entegrasyonu
            initPanzoom(totalPages);

            // Window resize
            $(window).on('resize orientationchange', function() {
              clearTimeout(window.resizeTimer);
              window.resizeTimer = setTimeout(function() {
                resizeFlipbook(totalPages);
              }, 250);
            });

          } catch(e) {
            console.error('Turn.js başlatma hatası:', e);
          }
        });
      }).catch(function(error) {
        console.error('PDF yüklenirken hata:', error);
        $('#loading-text').text('PDF yüklenemedi!');
        $('#loading-progress').html('<small style="color:#f87171;">' + error.message + '</small>');
      });
    });

    // ============================================
    //  DINAMIK BOYUT HESAPLAMA (ASPECT RATIO)
    // ============================================
    function calculateFlipbookDimensions() {
      var screenWidth = $(window).width();
      var screenHeight = $(window).height() - 80; // Alt kontrol paneli için boşluk

      // Display mode: 600px altında tek sayfa
      var displayMode = screenWidth < 600 ? 'single' : 'double';

      // Dergi en-boy oranı (Yaklaşık A4 oranı 1:1.41)
      var pageRatio = 1 / 1.414;
      var flipbookRatio = displayMode === 'single' ? pageRatio : (pageRatio * 2);

      var maxWidth = screenWidth * 0.95; 
      var maxHeight = screenHeight * 0.95;

      var width = maxWidth;
      var height = width / flipbookRatio;

      if (height > maxHeight) {
        height = maxHeight;
        width = height * flipbookRatio;
      }

      // Max sınır (Masaüstleri için çok devasa olmaması adına)
      if (displayMode === 'double' && width > 1400) {
        width = 1400;
        height = width / flipbookRatio;
      }

      return {
        width: Math.floor(width),
        height: Math.floor(height),
        display: displayMode
      };
    }

    // ============================================
    //  FLIPBOOK YENİDEN BOYUTLANDIRMA
    // ============================================
    function resizeFlipbook() {
      var dims = calculateFlipbookDimensions();

      try {
        $('#flipbook').turn('size', dims.width, dims.height);
        if ($('#flipbook').turn('display') !== dims.display) {
          $('#flipbook').turn('display', dims.display);
        }
      } catch(e) {}
    }

    // ============================================
    //  PDF SAYFA RENDER
    // ============================================
    function renderPage(pdf, pageNum) {
      return pdf.getPage(pageNum).then(function(page) {
        var canvas = document.createElement('canvas');
        var context = canvas.getContext('2d');

        // Ekran DPI'ına ve sayfa büyüklüğüne göre dinamik ve net render
        var pixelRatio = window.devicePixelRatio || 1;
        var scale = pixelRatio * 1.5; // Keskin okuma için dengeli bir oran, CSS zaten bunu sığdıracak
        
        // Çok büyük renderlardan kaçın (performans için cap atıyoruz)
        if (scale > 3.0) scale = 3.0; 
        
        var viewport = page.getViewport({scale: scale});

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        var renderContext = {
          canvasContext: context,
          viewport: viewport
        };

        return page.render(renderContext).promise.then(function() {
          return {
            pageNum: pageNum,
            canvas: canvas,
            pageWidth: viewport.width,
            pageHeight: viewport.height
          };
        });
      });
    }

    // ============================================
    //  MÜZİK KONTROLLERİ
    // ============================================
    function initMusicControls() {
      var audio = document.getElementById('background-music');
      var playBtn = $('#play-music-btn');
      var pauseBtn = $('#pause-music-btn');
      var volumeSlider = $('#volume-slider');

      // Başlangıç ses seviyesi
      audio.volume = 0.5;

      playBtn.click(function() {
        audio.play().then(function() {
          playBtn.hide();
          pauseBtn.show();
        }).catch(function(error) {
          console.error('Müzik çalınamadı:', error);
        });
      });

      pauseBtn.click(function() {
        audio.pause();
        pauseBtn.hide();
        playBtn.show();
      });

      volumeSlider.on('input', function() {
        audio.volume = $(this).val() / 100;
      });
    }

    // ============================================
    //  PANZOOM & PINCH TO ZOOM KONTROLLERİ
    // ============================================
    function initPanzoom(totalPages) {
      const elem = document.getElementById('flipbook-wrapper');
      
      // Panzoom nesnesini başlat
      const panzoom = Panzoom(elem, {
        maxScale: 3,
        minScale: 1,
        contain: 'outside', // Yakınlaştırıldığında dışarı çıkmasın
        step: 0.3, // Zoom hızı
        cursor: 'default'
      });

      // Masaüstü fare tekerleği ile zoom
      elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);

      // Butonları panzoom'a bağla
      document.getElementById('zoom-in-btn').addEventListener('click', panzoom.zoomIn);
      document.getElementById('zoom-out-btn').addEventListener('click', panzoom.zoomOut);
      document.getElementById('zoom-reset-btn').addEventListener('click', () => {
        panzoom.reset();
        // Sıfırlandığında dergiyi tekrar ortala
        setTimeout(() => resizeFlipbook(totalPages), 50);
      });

      // Mobilde çift dokunma (double tap) ile %150 zoom veya sıfırlama
      let lastTap = 0;
      $('#flipbook-container').on('touchend', function(e) {
        var currentTime = new Date().getTime();
        var tapLength = currentTime - lastTap;
        if (tapLength < 300 && tapLength > 0) {
          // Double tap tespit edildi
          if (panzoom.getScale() > 1.1) {
            panzoom.reset();
          } else {
            panzoom.zoom(1.5, { animate: true });
          }
          e.preventDefault();
        }
        lastTap = currentTime;
      });

      // Ekstra ergonomi: Zoom %100'deyken kaydırmayı (pan) durdur, 
      // sayfayı sürükleyebilmek için sadece zoomluysa pan'e izin ver.
      elem.addEventListener('panzoomchange', (e) => {
        if (e.detail.scale <= 1) {
          // Normal boyuttayken sürükleyerek sayfa çevirmeye izin ver
          $('#flipbook').css('pointer-events', 'auto');
        } else {
          // Büyütülmüş haldeyken sayfa çevirmeyi engelle, okumak için kaydırmaya (pan) odaklan
          $('#flipbook').css('pointer-events', 'none');
        }
      });
    }
  </script>
</body>
</html>

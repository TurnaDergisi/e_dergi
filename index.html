<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Turna Dergisi - E-Dergi</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
  <script src="https://raw.githack.com/blasten/turn.js/master/turn.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>
  <link rel="stylesheet" href="stil.css">
</head>
<body>

  <!-- Yükleme Ekranı -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Dergi Yükleniyor...</div>
    <div id="loading-progress"></div>
  </div>

  <!-- Ana Uygulama -->
  <div id="app">

    <!-- Üst Toolbar -->
    <div id="top-toolbar">
      <div class="tb-left">
        <span class="app-title">Turna Dergisi</span>
      </div>
      <div class="tb-right">
        <a id="download-btn" class="tb-btn" href="dergi.pdf" download title="PDF İndir">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="btn-label">İndir</span>
        </a>
      </div>
    </div>

    <!-- Orta Alan: Panel + Flipbook -->
    <div id="middle-area">

      <!-- Sol Panel -->
      <div id="side-panel">
        <div id="panel-header">
          <button type="button" id="panel-thumbnails-tab" class="panel-tab active">Sayfalar</button>
          <button type="button" id="panel-toc-tab" class="panel-tab">İçindekiler</button>
          <button type="button" id="panel-close-btn" title="Kapat">✕</button>
        </div>
        <div id="panel-thumbnails" class="panel-content">
          <div id="thumbnail-grid"></div>
        </div>
        <div id="panel-toc" class="panel-content panel-content--hidden">
          <ul id="toc-list"></ul>
        </div>
      </div>

      <!-- Flipbook Konteyneri -->
      <div id="flipbook-container">
        <div id="flipbook-wrapper">
          <div id="flipbook"></div>
        </div>
      </div>

    </div><!-- /#middle-area -->

    <!-- Alt Toolbar -->
    <div id="bottom-toolbar">

      <!-- Sol grup: Panel toggleları -->
      <div class="btb-group">
        <button type="button" id="thumbnail-btn" class="tb-btn" title="Küçük Resimler">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span class="btn-label">Sayfalar</span>
        </button>
        <button type="button" id="toc-btn" class="tb-btn" title="İçindekiler">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
          <span class="btn-label">İçerik</span>
        </button>
      </div>

      <!-- Orta grup: Sayfa navigasyonu -->
      <div class="btb-group">
        <button type="button" id="prev-btn" class="tb-btn" title="Önceki Sayfa">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div id="page-nav">
          <input type="number" id="page-input" min="1" value="1" title="Sayfa numarası" aria-label="Sayfa numarası">
          <span id="page-total">/ 0</span>
        </div>
        <button type="button" id="next-btn" class="tb-btn" title="Sonraki Sayfa">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <!-- Sağ grup: Zoom, Oto, Ses, Tam Ekran -->
      <div class="btb-group">
        <button type="button" id="zoom-out-btn" class="tb-btn" title="Uzaklaştır">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button type="button" id="zoom-reset-btn" class="tb-btn" title="Sıfırla">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button type="button" id="zoom-in-btn" class="tb-btn" title="Yakınlaştır">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>

        <div class="tb-divider"></div>

        <button type="button" id="autoplay-btn" class="tb-btn" title="Otomatik Oynat">
          <svg id="autoplay-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span class="btn-label">Oto</span>
        </button>

        <button type="button" id="sound-btn" class="tb-btn" title="Ses Aç/Kapat">
          <svg id="sound-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <div class="volume-wrapper">
          <input type="range" id="volume-slider" min="0" max="100" value="50" title="Ses seviyesi" aria-label="Ses seviyesi">
        </div>

        <div class="tb-divider"></div>

        <button type="button" id="fullscreen-btn" class="tb-btn" title="Tam Ekran">
          <svg id="fullscreen-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
      </div>

    </div><!-- /#bottom-toolbar -->

  </div><!-- /#app -->

  <!-- Arka Plan Müziği -->
  <audio id="background-music" loop>
    <source src="https://drive.google.com/uc?export=download&id=12FeOxyc6Q_yg1vm-Mt7k18Uz3IBe5xDd" type="audio/mpeg">
  </audio>

  <script>
    // ============================================
    //  YAPILANDIRMA
    // ============================================
    var PDF_URL        = 'dergi.pdf';
    var TOOLBAR_TOP    = 44;
    var TOOLBAR_BOTTOM = 48;
    var AUTOPLAY_MS    = 3000;  // Otomatik oynatma aralığı (ms)

    // İçindekiler — sayfa numaralarını kendi dergine göre düzenle
    var TOC_ITEMS = [
      { title: 'Kapak',          page: 1  },
      { title: 'Editörden',      page: 3  },
      { title: 'Gündem',         page: 5  },
      { title: 'Haberler',       page: 9  },
      { title: 'Röportaj',       page: 15 },
      { title: 'Kültür & Sanat', page: 21 },
      { title: 'Spor',           page: 27 },
      { title: 'Teknoloji',      page: 33 },
      { title: 'Son Sayfa',      page: 48 }
    ];

    // ============================================
    //  BAŞLANGIÇ
    // ============================================
    $(document).ready(function() {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      var loadingTask = pdfjsLib.getDocument(PDF_URL);

      loadingTask.promise.then(function(pdf) {
        var totalPages = pdf.numPages;
        var renderedPages = [];

        $('#page-input').attr('max', totalPages);
        $('#page-total').text('/ ' + totalPages);

        // Sayfaları sırayla render et
        var renderChain = Promise.resolve();

        for (var i = 1; i <= totalPages; i++) {
          (function(num) {
            renderChain = renderChain.then(function() {
              return renderPage(pdf, num).then(function(data) {
                renderedPages.push(data);
                var pct = Math.round((num / totalPages) * 100);
                $('#loading-progress').text(num + ' / ' + totalPages + ' sayfa (' + pct + '%)');
              });
            });
          })(i);
        }

        renderChain.then(function() {
          renderedPages.sort(function(a, b) { return a.pageNum - b.pageNum; });

          // Sayfaları flipbook'a ekle
          renderedPages.forEach(function(data) {
            var div = $('<div></div>').addClass('page').css({
              width:          data.pageWidth  + 'px',
              height:         data.pageHeight + 'px',
              display:        'flex',
              justifyContent: 'center',
              alignItems:     'center',
              overflow:       'hidden'
            });
            $(data.canvas).css({ width: '100%', height: '100%', objectFit: 'fill', display: 'block' });
            div.append(data.canvas);
            $('#flipbook').append(div);
          });

          // Loading'i gizle, uygulamayı göster
          $('#loading').fadeOut(300, function() {
            $('#app').addClass('visible');
            initFlipbook(totalPages);
            buildThumbnails(renderedPages, totalPages);
            buildTOC();
            initMusicControls();
            initAutoplay(totalPages);
            initFullscreen();
          });
        });

      }).catch(function(err) {
        $('#loading-text').text('PDF yüklenemedi!');
        $('#loading-progress').html('<small style="color:#f87171;">' + err.message + '</small>');
      });

      // Panel buton olayları (DOM hazır olunca bağla)
      initPanelControls();
    });

    // ============================================
    //  PDF SAYFA RENDER
    // ============================================
    function renderPage(pdf, pageNum) {
      return pdf.getPage(pageNum).then(function(page) {
        var pixelRatio = window.devicePixelRatio || 1;
        var scale      = Math.min(pixelRatio * 1.5, 3.0);
        var viewport   = page.getViewport({ scale: scale });

        var canvas  = document.createElement('canvas');
        canvas.width  = viewport.width;
        canvas.height = viewport.height;

        return page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise.then(function() {
          // Thumbnail: ana canvas'tan küçülterek türet (yeniden render yok)
          var THUMB_W = 88;
          var thumbH  = Math.round(THUMB_W * (canvas.height / canvas.width));
          var thumb   = document.createElement('canvas');
          thumb.width  = THUMB_W;
          thumb.height = thumbH;
          thumb.getContext('2d').drawImage(canvas, 0, 0, THUMB_W, thumbH);

          return {
            pageNum:    pageNum,
            canvas:     canvas,
            thumb:      thumb,
            pageWidth:  viewport.width,
            pageHeight: viewport.height
          };
        });
      });
    }

    // ============================================
    //  FLIPBOOK BOYUT HESAPLAMA
    // ============================================
    function calculateFlipbookDimensions() {
      var panelOpen   = $('#side-panel').hasClass('open');
      var panelWidth  = panelOpen ? ($('#side-panel').width() || 240) : 0;
      var screenW     = $(window).width() - panelWidth;
      var screenH     = $(window).height() - TOOLBAR_TOP - TOOLBAR_BOTTOM;
      var isSingle    = screenW < 600;

      var pageRatio   = 1 / 1.414;   // A4 oranı
      var flipRatio   = isSingle ? pageRatio : pageRatio * 2;

      var maxW = screenW * 0.95;
      var maxH = screenH * 0.95;
      var w = maxW;
      var h = w / flipRatio;

      if (h > maxH) { h = maxH; w = h * flipRatio; }
      if (!isSingle && w > 1400) { w = 1400; h = w / flipRatio; }

      return { width: Math.floor(w), height: Math.floor(h), display: isSingle ? 'single' : 'double' };
    }

    // ============================================
    //  FLIPBOOK BAŞLATMA
    // ============================================
    function initFlipbook(totalPages) {
      if (typeof $.fn.turn !== 'function') {
        alert('Turn.js yüklenemedi. Sayfayı yenileyin.');
        return;
      }

      var dims = calculateFlipbookDimensions();

      $('#flipbook').turn({
        width:        dims.width,
        height:       dims.height,
        autoCenter:   true,
        elevation:    50,
        gradients:    true,
        acceleration: true,
        display:      dims.display,
        duration:     800,
        when: {
          turned: function(e, page) {
            $('#page-input').val(page);
            // Thumbnail'deki aktif öğeyi güncelle
            $('.thumb-item').removeClass('current');
            $('.thumb-item[data-page="' + page + '"]').addClass('current');
          }
        }
      });

      // --- Navigasyon ---
      $('#prev-btn').click(function() { $('#flipbook').turn('previous'); });
      $('#next-btn').click(function() { $('#flipbook').turn('next'); });

      // Sayfa numarası inputu
      $('#page-input').on('change', function() {
        var p = parseInt($(this).val(), 10);
        if (p >= 1 && p <= totalPages) {
          $('#flipbook').turn('page', p);
        } else {
          $(this).val($('#flipbook').turn('page'));
        }
      });

      // Klavye
      $(document).keydown(function(e) {
        if ($(e.target).is('input')) return;
        if (e.keyCode === 37) $('#flipbook').turn('previous');
        if (e.keyCode === 39) $('#flipbook').turn('next');
      });

      // Tıklama ile sayfa çevirme (masaüstü)
      var isDragging = false;
      $('#flipbook')
        .on('mousedown', function() { isDragging = false; })
        .on('mousemove', function() { isDragging = true; })
        .on('mouseup',   function(e) {
          if (isDragging) return;
          var x = e.pageX - $(this).offset().left;
          if (x < $(this).width() / 2) $(this).turn('previous');
          else $(this).turn('next');
        })
        .css('cursor', 'pointer');

      // Panzoom
      initPanzoom();

      // Pencere boyutu değişince yeniden boyutlandır
      $(window).on('resize orientationchange', function() {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(resizeFlipbook, 250);
      });
    }

    function resizeFlipbook() {
      var d = calculateFlipbookDimensions();
      try {
        $('#flipbook').turn('size', d.width, d.height);
        if ($('#flipbook').turn('display') !== d.display) {
          $('#flipbook').turn('display', d.display);
        }
      } catch(e) {}
    }

    // ============================================
    //  PANZOOM
    // ============================================
    function initPanzoom() {
      var elem    = document.getElementById('flipbook-wrapper');
      var panzoom = Panzoom(elem, {
        maxScale: 3,
        minScale: 1,
        contain:  'outside',
        step:     0.3,
        cursor:   'default'
      });

      elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);

      document.getElementById('zoom-in-btn').addEventListener('click',  panzoom.zoomIn);
      document.getElementById('zoom-out-btn').addEventListener('click', panzoom.zoomOut);
      document.getElementById('zoom-reset-btn').addEventListener('click', function() {
        panzoom.reset();
        setTimeout(resizeFlipbook, 50);
      });

      // Çift dokunma ile zoom geçişi (mobil)
      var lastTap = 0;
      $('#flipbook-container').on('touchend', function(e) {
        var now = Date.now();
        if (now - lastTap < 300 && now - lastTap > 0) {
          panzoom.getScale() > 1.1 ? panzoom.reset() : panzoom.zoom(1.5, { animate: true });
          e.preventDefault();
        }
        lastTap = now;
      });

      // Zoom > 1 iken sayfa çevirmeyi durdur
      elem.addEventListener('panzoomchange', function(ev) {
        $('#flipbook').css('pointer-events', ev.detail.scale <= 1 ? 'auto' : 'none');
      });
    }

    // ============================================
    //  THUMBNAIL PANELİ
    // ============================================
    function buildThumbnails(pages, totalPages) {
      var grid = $('#thumbnail-grid');
      pages.forEach(function(data) {
        var wrap  = $('<div class="thumb-item"></div>').attr('data-page', data.pageNum);
        var label = $('<span class="thumb-label"></span>').text(data.pageNum);
        $(data.thumb).addClass('thumb-canvas');
        wrap.append(data.thumb).append(label);
        wrap.on('click', function() {
          var p = parseInt($(this).data('page'), 10);
          $('#flipbook').turn('page', p);
          if ($(window).width() < 620) closeSidePanel();
        });
        grid.append(wrap);
      });

      // İlk sayfayı aktif yap
      $('.thumb-item[data-page="1"]').addClass('current');
    }

    // ============================================
    //  İÇİNDEKİLER (TOC)
    // ============================================
    function buildTOC() {
      var list = $('#toc-list');
      TOC_ITEMS.forEach(function(item) {
        var a  = $('<a href="#"></a>').text(item.title);
        var pg = $('<span class="toc-page"></span>').text(item.page);
        a.on('click', function(e) {
          e.preventDefault();
          $('#flipbook').turn('page', item.page);
          if ($(window).width() < 620) closeSidePanel();
        });
        $('<li></li>').append(a).append(pg).appendTo(list);
      });
    }

    // ============================================
    //  PANEL KONTROLLERİ
    // ============================================
    function openPanel(tab) {
      // tab: 'thumbnails' veya 'toc'
      $('#side-panel').addClass('open');
      if (tab === 'toc') {
        $('#panel-thumbnails').hide();
        $('#panel-toc').show();
        $('#panel-toc-tab').addClass('active');
        $('#panel-thumbnails-tab').removeClass('active');
        $('#toc-btn').addClass('active');
        $('#thumbnail-btn').removeClass('active');
      } else {
        $('#panel-toc').hide();
        $('#panel-thumbnails').show();
        $('#panel-thumbnails-tab').addClass('active');
        $('#panel-toc-tab').removeClass('active');
        $('#thumbnail-btn').addClass('active');
        $('#toc-btn').removeClass('active');
      }
      setTimeout(resizeFlipbook, 280);
    }

    function closeSidePanel() {
      $('#side-panel').removeClass('open');
      $('#thumbnail-btn, #toc-btn').removeClass('active');
      setTimeout(resizeFlipbook, 280);
    }

    function initPanelControls() {
      $('#thumbnail-btn').on('click', function() {
        var isOpen  = $('#side-panel').hasClass('open');
        var isMine  = $(this).hasClass('active');
        if (isOpen && isMine) closeSidePanel();
        else openPanel('thumbnails');
      });

      $('#toc-btn').on('click', function() {
        var isOpen = $('#side-panel').hasClass('open');
        var isMine = $(this).hasClass('active');
        if (isOpen && isMine) closeSidePanel();
        else openPanel('toc');
      });

      $('#panel-thumbnails-tab').on('click', function() {
        $('#panel-thumbnails').show(); $('#panel-toc').hide();
        $(this).addClass('active'); $('#panel-toc-tab').removeClass('active');
        $('#thumbnail-btn').addClass('active'); $('#toc-btn').removeClass('active');
      });

      $('#panel-toc-tab').on('click', function() {
        $('#panel-toc').show(); $('#panel-thumbnails').hide();
        $(this).addClass('active'); $('#panel-thumbnails-tab').removeClass('active');
        $('#toc-btn').addClass('active'); $('#thumbnail-btn').removeClass('active');
      });

      $('#panel-close-btn').on('click', closeSidePanel);
    }

    // ============================================
    //  MÜZİK KONTROLLERİ
    // ============================================
    function initMusicControls() {
      var audio     = document.getElementById('background-music');
      var isPlaying = false;
      audio.volume  = 0.5;

      $('#sound-btn').on('click', function() {
        if (isPlaying) {
          audio.pause();
          isPlaying = false;
          $(this).removeClass('active');
        } else {
          audio.play()
            .then(function() {
              isPlaying = true;
              $('#sound-btn').addClass('active');
            })
            .catch(function(e) { console.warn('Ses çalınamadı:', e); });
        }
      });

      $('#volume-slider').on('input', function() {
        audio.volume = $(this).val() / 100;
      });
    }

    // ============================================
    //  OTOMATİK OYNATMA
    // ============================================
    function initAutoplay(totalPages) {
      var timer = null;

      $('#autoplay-btn').on('click', function() {
        if (timer) {
          clearInterval(timer);
          timer = null;
          $(this).removeClass('active');
          // Play ikonu
          document.getElementById('autoplay-icon').innerHTML =
            '<polygon points="5 3 19 12 5 21 5 3"/>';
        } else {
          timer = setInterval(function() {
            var curr = $('#flipbook').turn('page');
            $('#flipbook').turn(curr >= totalPages ? 'first' : 'next');
          }, AUTOPLAY_MS);
          $(this).addClass('active');
          // Pause ikonu
          document.getElementById('autoplay-icon').innerHTML =
            '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
        }
      });
    }

    // ============================================
    //  TAM EKRAN
    // ============================================
    function initFullscreen() {
      var btn  = document.getElementById('fullscreen-btn');
      var icon = document.getElementById('fullscreen-icon');

      var ENTER_PATH = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
      var EXIT_PATH  = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 0 2-2h3M3 16h3a2 2 0 0 0 2 2v3"/>';

      btn.addEventListener('click', function() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(function(e) {
            console.warn('Tam ekran açılamadı:', e);
          });
        } else {
          document.exitFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', function() {
        icon.innerHTML = document.fullscreenElement ? EXIT_PATH : ENTER_PATH;
      });
    }
  </script>
</body>
</html>
